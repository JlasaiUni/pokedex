<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/pokedex.css">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/reboot.css">
    <link rel="stylesheet" href="./css//normalize.css">
    <title>Home</title>
</head>
<body>
    <header>
      <img id="img_logo" src="./img/logo_pokedex.png" alt="logo pokedex" >
      <nav id="main_nav"><a href="pokedex\index.html" class="nav_button">Home</a ><a href="" class="nav_button">Pokedex</a></nav>
    </header>
    <main id="body_main">
      <input id="buscador" type="text" placeholder="Search a Pokémon...">
      <div class="card_holder">
        <div class="card_green">
          <header class="card_header">
            <p class="card_name"><strong>Bulbasaur</strong></p> 
            <p class="card_number"><strong>#001</strong></p>
          </header>
          <main class="card_main">
            <img id="img_pokemon" src="./img/001.png" alt="foto de Bulbasaur">
            <div class="type_holder">
                <p class="type_grass">Grass</p>
                <p class="type_poison">Poison</p>
            </div>
            <div class="characteristics_holder">
                <p class="weight">6.9 kg</p>
                <p class="height">0.7 m</p>
            </div>
          </main>
        </div>
        <div class="card_green">
          <header class="card_header">
            <p class="card_name"><strong>Ivysaur</strong></p>
            <p class="card_number"><strong>#002</strong></p>
          </header>
          <main class="card_main">
            <img id="img_pokemon" src="./img/002.png" alt="foto de Ivysaur">
          </main>
        </div>
        <div class="card_green">
          <header class="card_header">
            <p class="card_name"><strong>Venusaur</strong></p>
            <p class="card_number"><strong>#003</strong></p>
          </header>
          <main class="card_main">
            <img id="img_pokemon" src="./img/003.png" alt="foto de Venusaur">
          </main>
        </div>
      </div>
    </main>
    <footer><p class="copyright"> c 2024 Pokémon c 1995 - 2024 Nintendo/Creatures Inc./GAME FREAK inc. TM, R Nintendo.</p></footer>
</body>
</html>
